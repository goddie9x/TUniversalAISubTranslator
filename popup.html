<!doctype html><html><head><meta charset="UTF-8"><style>:root{--primary:#722ed1}body{width:320px;padding:15px;font-family:"Segoe UI",sans-serif;background:#fff;color:#333}.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;border-bottom:1px solid #eee;padding-bottom:10px}.logo{font-size:16px;font-weight:700;color:var(--primary)}.section{margin-bottom:15px}.label{display:block;font-size:10px;font-weight:700;color:#999;text-transform:uppercase;margin-bottom:5px}.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px}input,select,textarea{width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;outline:0;font-size:13px;box-sizing:border-box}textarea{resize:vertical;min-height:60px;font-family:inherit}.switch{position:relative;width:34px;height:18px;flex-shrink:0}.switch input{opacity:0;width:0;height:0}.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;transition:.4s;border-radius:20px}.slider:before{position:absolute;content:"";height:14px;width:14px;left:2px;bottom:2px;background:#fff;transition:.4s;border-radius:50%}input:checked+.slider{background:var(--primary)}input:checked+.slider:before{transform:translateX(16px)}.btn-save{background:var(--primary);color:#fff;border:none;width:100%;padding:10px;border-radius:4px;cursor:pointer;font-weight:700;margin-top:10px;transition:opacity .2s}.btn-save:hover{opacity:.9}#botSettings.disabled{opacity:.4;pointer-events:none}</style></head><body><div class="header"><div class="logo">UNIVERSAL SUB AI</div><label class="switch"><input type="checkbox" id="enabled" checked="checked"><span class="slider"></span></label></div><div id="botSettings"><div class="section"><label class="label">Mô hình & API Key</label><select id="model" style="margin-bottom:5px"><option value="gemini">Google Gemini 2.0</option><option value="mistral">Mistral AI (Small/Large)</option></select><input type="password" id="apiKey" placeholder="Dán API Key vào đây..."></div><div class="section"><label class="label">Ngôn ngữ đích & Ngữ cảnh (Xưng hô)</label><select id="targetLang" style="margin-bottom:5px"><option value="Vietnamese">Tiếng Việt</option><option value="English">English</option></select><textarea id="systemPrompt" placeholder="Ví dụ: Dịch tự nhiên, xưng hô anh - em, dùng từ ngữ thân mật..."></textarea></div><div class="section"><label class="label">Giao diện phụ đề</label><div class="row"><input type="number" id="fontSize" placeholder="Size (px)" title="Font Size"> <input type="color" id="textColor" title="Màu chữ"></div><input type="text" id="bgColor" placeholder="Màu nền (rgba/hex)"></div><button id="save" class="btn-save">LƯU CÀI ĐẶT</button></div><script src="popup.js"></script></body></html>
